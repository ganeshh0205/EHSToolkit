name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crain-compliance-companion-main
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crain-compliance-companion-main/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build
        env:
          # VITE_API_BASE_URL: "https://your-render-backend-url.onrender.com" # Uncomment and replace with your Render backend URL once deployed
          VITE_API_BASE_URL: "https://enviroconsult-platform-1.onrender.com" # Example default

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'crain-compliance-companion-main/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
