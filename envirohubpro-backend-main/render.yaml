services:
  - type: web
    name: envirohubpro-backend
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: APP_NAME
        value: EnviroHub Pro AI API
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
